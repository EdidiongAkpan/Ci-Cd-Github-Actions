name: cd-workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'kubernetes/**'
      - 'README.md'

permissions:
  contents: write

jobs:
  docker-build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/voting-app:${{ github.sha }}

      - name: Update image tag in Kubernetes deployment
        run: |
          sed -i "s|image:.*voting-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/voting-app:${{ github.sha }}|" kubernetes/app-deployment.yml

      - name: Commit and push updated manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add kubernetes/app-deployment.yml
          git commit -m "Update image to ${{ github.sha }}"
          git push